name: Enterprise DevSecOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  security-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-service

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Run Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          pip install -r requirements.txt
          pip install flake8 safety

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Linting
        run: flake8 app tests --max-line-length=100

      - name: Run Unit Tests
        run: pytest -v

      - name: Run Dependency Security Scan
        run: safety check --full-report
        continue-on-error: true

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./app-service
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/enterprise-devsecops-app:latest
            ghcr.io/${{ github.repository_owner }}/enterprise-devsecops-app:${{ github.sha }}

      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/enterprise-devsecops-app:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
